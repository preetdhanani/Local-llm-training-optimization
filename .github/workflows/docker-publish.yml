name: 🐳 Build & Publish Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

# Grant write access to GitHub packages (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercase the repository name (required for docker tag naming rules)
      - name: 🏷️ Process Repository Name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 📦 Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}

      - name: 📦 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=http://localhost:8000
